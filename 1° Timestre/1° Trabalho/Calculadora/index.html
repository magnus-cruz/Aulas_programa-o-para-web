<!DOCTYPE html>
<html lang="pt-BR">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Calculadora de Idade</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
	<link rel="stylesheet" href="style.css">
</head>
<body>
	<main class="page">
		<section class="hero" aria-labelledby="titulo-principal">
			<header class="hero__header">
				<p class="hero__eyebrow">HTML5 • CSS3 • JavaScript</p>
				<h1 id="titulo-principal">Calculadora de Idade</h1>
				<p class="hero__subtitle">Preencha os dados abaixo e veja a mensagem ser montada diretamente na página.</p>
			</header>

			<div class="content-grid">
				<section class="card" aria-label="Formulário de cálculo de idade">
					<form id="form-idade" class="form" novalidate>
						<div class="field">
							<label for="nome"><i class="fa-solid fa-user"></i> Nome</label>
							<input type="text" id="nome" placeholder="Seu nome completo" autocomplete="name">
						</div>

						<div class="field">
							<label for="nascimento"><i class="fa-solid fa-calendar-days"></i> Data de Nascimento</label>
							<input type="text" id="nascimento" placeholder="DD/MM/AAAA" inputmode="numeric" maxlength="10" aria-describedby="ajuda-data">
							<small id="ajuda-data">Use o formato DD/MM/AAAA.</small>
						</div>

						<button type="submit" id="btn-calcular" class="btn">
							<i class="fa-solid fa-calculator"></i>
							Calcular idade
						</button>
					</form>

					<div id="mensagem" class="message" aria-live="polite" role="status">
						Informe seu nome e a data de nascimento para ver o resultado.
					</div>
				</section>

				<aside class="decor" aria-label="Elemento decorativo com loader">
					<div class="decor__panel">
						<h2>Loader decorativo</h2>
						<p>A animação permanece visível como parte da composição visual.</p>

						<div class="loader" aria-hidden="true">
							<div class="cell d-0"></div>
							<div class="cell d-1"></div>
							<div class="cell d-2"></div>
							<div class="cell d-1"></div>
							<div class="cell d-2"></div>
							<div class="cell d-2"></div>
							<div class="cell d-3"></div>
							<div class="cell d-3"></div>
							<div class="cell d-4"></div>
						</div>
					</div>
				</aside>
			</div>
		</section>
	</main>

	<script src="script.js"></script>
</body>
</html>
