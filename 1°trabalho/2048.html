<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>2048 • Tema 2048</title>
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
	<link rel="stylesheet" href="css/style.css" />

</head>
<body>
	<div class="loading-screen" id="loadingScreen" aria-live="polite" aria-label="Carregando jogo">
		<div class="loop cubes" aria-hidden="true">
			<div class="item cubes"></div>
			<div class="item cubes"></div>
			<div class="item cubes"></div>
			<div class="item cubes"></div>
			<div class="item cubes"></div>
			<div class="item cubes"></div>
		</div>
	</div>

	<div class="app">
		<header>
			<div>
				<h1>2048</h1>
				<p class="subtitle">Deslize as peças e alcance 2048.</p>
			</div>

			<div class="header-actions">
				<div class="theme-wrap">
					<span id="themeLabel">Tema claro</span>
					<label class="switch" aria-label="Alternar tema claro e escuro">
						<input type="checkbox" id="input">
						<div class="theme-slider">
							<div class="sun-moon">
								<svg id="moon-dot-1" class="moon-dot" viewBox="0 0 100 100"><circle cx="50" cy="50" r="50"></circle></svg>
								<svg id="moon-dot-2" class="moon-dot" viewBox="0 0 100 100"><circle cx="50" cy="50" r="50"></circle></svg>
								<svg id="moon-dot-3" class="moon-dot" viewBox="0 0 100 100"><circle cx="50" cy="50" r="50"></circle></svg>
								<svg id="light-ray-1" viewBox="0 0 100 100"><circle cx="50" cy="50" r="50"></circle></svg>
								<svg id="light-ray-2" viewBox="0 0 100 100"><circle cx="50" cy="50" r="50"></circle></svg>
								<svg id="light-ray-3" viewBox="0 0 100 100"><circle cx="50" cy="50" r="50"></circle></svg>
								<svg id="cloud-1" class="cloud-dark" viewBox="0 0 100 100"><circle cx="50" cy="50" r="50"></circle></svg>
								<svg id="cloud-2" class="cloud-dark" viewBox="0 0 100 100"><circle cx="50" cy="50" r="50"></circle></svg>
								<svg id="cloud-3" class="cloud-dark" viewBox="0 0 100 100"><circle cx="50" cy="50" r="50"></circle></svg>
								<svg id="cloud-4" class="cloud-light" viewBox="0 0 100 100"><circle cx="50" cy="50" r="50"></circle></svg>
								<svg id="cloud-5" class="cloud-light" viewBox="0 0 100 100"><circle cx="50" cy="50" r="50"></circle></svg>
								<svg id="cloud-6" class="cloud-light" viewBox="0 0 100 100"><circle cx="50" cy="50" r="50"></circle></svg>
							</div>
							<div class="stars">
								<svg id="star-1" class="star" viewBox="0 0 20 20"><path d="M 0 10 C 10 10,10 10 ,0 10 C 10 10 , 10 10 , 10 20 C 10 10 , 10 10 , 20 10 C 10 10 , 10 10 , 10 0 C 10 10,10 10 ,0 10 Z"></path></svg>
								<svg id="star-2" class="star" viewBox="0 0 20 20"><path d="M 0 10 C 10 10,10 10 ,0 10 C 10 10 , 10 10 , 10 20 C 10 10 , 10 10 , 20 10 C 10 10 , 10 10 , 10 0 C 10 10,10 10 ,0 10 Z"></path></svg>
								<svg id="star-3" class="star" viewBox="0 0 20 20"><path d="M 0 10 C 10 10,10 10 ,0 10 C 10 10 , 10 10 , 10 20 C 10 10 , 10 10 , 20 10 C 10 10 , 10 10 , 10 0 C 10 10,10 10 ,0 10 Z"></path></svg>
								<svg id="star-4" class="star" viewBox="0 0 20 20"><path d="M 0 10 C 10 10,10 10 ,0 10 C 10 10 , 10 10 , 10 20 C 10 10 , 10 10 , 20 10 C 10 10 , 10 10 , 10 0 C 10 10,10 10 ,0 10 Z"></path></svg>
							</div>
						</div>
					</label>
				</div>
			</div>
		</header>

		<main>
			<section class="panel game-panel" aria-label="Jogo 2048">
				<div class="game-top">
					<div class="score-wrap">
						<div class="score-box">
							<span class="label">Pontuação</span>
							<span class="value" id="scoreValue">0</span>
						</div>
						<div class="score-box">
							<span class="label">Melhor</span>
							<span class="value" id="bestValue">0</span>
						</div>
					</div>
					<button class="btn" id="newGameBtn" type="button">Nova Partida</button>
				</div>

				<div class="board-wrap">
					<div class="game-board" id="gameBoard" aria-label="Tabuleiro 4 por 4">
						<div class="grid-bg" id="gridBg"></div>
						<div class="tiles-layer" id="tilesLayer"></div>
					</div>
					<div class="state-overlay" id="stateOverlay" aria-live="polite">
						<div class="state-card">
							<h3 id="overlayTitle">Game Over</h3>
							<p id="overlayText">Pontuação: 0</p>
							<div class="overlay-actions" id="overlayActions"></div>
						</div>
					</div>
				</div>

				<p class="help">Controles: Setas, WASD, arrastar com mouse ou swipe no celular.</p>
			</section>
		</main>

		<footer>
			2048 em arquivo único • Tema, loading e persistência de pontuação local.
		</footer>
	</div>

	<script src="js/script.js"></script>
	<script src="js/game.js"></script>
</body>
</html>
